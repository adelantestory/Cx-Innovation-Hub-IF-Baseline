name: Playwright Tests

on:
  push:
    branches:
      - main
      - demo/playwright-testing
  pull_request:
    branches:
      - main
      - demo/playwright-testing
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test filter — use @tag (e.g. @smoke, @qa, @uat) for environment tags, or a spec filename. Leave blank to run all."
        required: false
        default: ""
      browser:
        description: "Browser to run tests on (chromium, firefox, webkit, or all). Defaults to all."
        required: false
        default: "all"

jobs:
  playwright:
    name: Run Playwright E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event.inputs.browser == 'all' || github.event.inputs.browser == '' ? fromJSON('["chromium","firefox","webkit"]') : fromJSON(format('["{0}"]', github.event.inputs.browser)) }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskify"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize database
        run: |
          for f in concept/sql/*.sql; do
            echo "Running $f..."
            PGPASSWORD=postgres psql -h localhost -U postgres -d taskify -f "$f"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            concept/apps/api/package-lock.json
            concept/apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: concept/apps/api
        run: npm ci

      - name: Install Web dependencies
        working-directory: concept/apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: concept/apps/web
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Playwright tests
        working-directory: concept/apps/web
        env:
          CI: true
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: taskify
          PGPORT: 5432
          PGSSLMODE: disable
          AZURE_KEY_VAULT_URL: ""
          CORS_ORIGIN: http://localhost:5173
          VITE_API_URL: http://localhost:3000
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [[ "$FILTER" == @* ]]; then
            npx playwright test --project="${{ matrix.browser }}" --grep "$FILTER"
          elif [ -n "$FILTER" ]; then
            npx playwright test --project="${{ matrix.browser }}" $FILTER
          else
            npx playwright test --project="${{ matrix.browser }}"
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}-${{ github.run_id }}
          path: |
            concept/apps/web/playwright-report/
            concept/apps/web/test-results/
          retention-days: 30