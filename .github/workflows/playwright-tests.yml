name: Playwright Tests

on:
  push:
    branches: [demo/playwright-testing]
  pull_request:
    branches: [demo/playwright-testing]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test filter — use @tag (e.g. @dev, @qa) for environment tags, or a spec filename. Leave blank to run all."
        required: false
        default: ""

jobs:
  playwright:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: concept/apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: concept/apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: concept/apps/web
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: concept/apps/web
        env:
          CI: true
          VITE_API_URL: http://localhost:3000
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [[ "$FILTER" == @* ]]; then
            npx playwright test --grep "$FILTER"
          elif [ -n "$FILTER" ]; then
            npx playwright test $FILTER
          else
            npx playwright test
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: concept/apps/web/tests/test results/
          retention-days: 14