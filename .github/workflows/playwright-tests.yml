name: Playwright Tests

on:
  push:
    branches: [demo/playwright-testing]
  pull_request:
    branches: [demo/playwright-testing]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test filter — use @tag (e.g. @dev, @qa) for environment tags, or a spec filename. Leave blank to run all."
        required: false
        default: ""

jobs:
  playwright:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskify"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize database
        run: |
          shopt -s nullglob
          sql_files=(concept/sql/*.sql)
          if [[ ${#sql_files[@]} -eq 0 ]]; then
            echo "No SQL seed files found in concept/sql/ — skipping database initialization."
          else
            for f in "${sql_files[@]}"; do
              echo "Running $f..."
              PGPASSWORD=postgres psql -h localhost -U postgres -d taskify -f "$f"
            done
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            concept/apps/api/package-lock.json
            concept/apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: concept/apps/api
        run: npm ci

      - name: Install Web dependencies
        working-directory: concept/apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: concept/apps/web
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: concept/apps/web
        env:
          CI: true
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: taskify
          PGPORT: 5432
          PGSSLMODE: disable
          AZURE_KEY_VAULT_URL: ""
          CORS_ORIGIN: http://localhost:5173
          VITE_API_URL: http://localhost:3000
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [[ "$FILTER" == @* ]]; then
            npx playwright test --grep "$FILTER"
          elif [ -n "$FILTER" ]; then
            npx playwright test $FILTER
          else
            npx playwright test
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: concept/apps/web/playwright-report/
          retention-days: 14
