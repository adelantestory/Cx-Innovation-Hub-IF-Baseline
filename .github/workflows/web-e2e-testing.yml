name: Web E2E Testing

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'concept/apps/web/**'
      - 'concept/apps/api/**'
      - 'concept/docker-compose.yml'
      - '.github/workflows/web-e2e-testing.yml'
  push:
    branches:
      - main
      - demo/performance-testing
    paths:
      - 'concept/apps/web/**'
      - 'concept/apps/api/**'
      - 'concept/docker-compose.yml'
      - '.github/workflows/web-e2e-testing.yml'

permissions:
  contents: read

concurrency:
  group: web-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            concept/apps/web/package-lock.json
            concept/apps/api/package-lock.json

      - name: Install e2e dependencies
        working-directory: concept/tests/e2e
        run: npm ci

      - name: Install API dependencies
        working-directory: concept/apps/api
        run: npm ci

      - name: Start local stack with Docker Compose
        working-directory: concept
        run: |
          docker compose up -d --build --wait

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1 && curl -sf http://localhost:5173 >/dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for services..."
            sleep 5
          done
          docker compose -f concept/docker-compose.yml logs
          exit 1

      - name: Install Playwright browsers
        working-directory: concept/tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: concept/tests/e2e
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: concept/tests/e2e/playwright-report/
          if-no-files-found: ignore
