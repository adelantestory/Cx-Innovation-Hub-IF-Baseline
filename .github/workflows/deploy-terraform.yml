# =============================================================================
# Deploy Infrastructure (Terraform)
# =============================================================================
# Deploys Azure infrastructure using the Terraform configuration at
# concept/infrastructure/terraform/.
#
# Authentication: OIDC federated credentials (no stored secrets).
#   Required GitHub environment secrets:
#     AZURE_CLIENT_ID_PERF     - Service principal / workload identity client ID
#     AZURE_TENANT_ID_PERF     - Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID_PERF - Target Azure subscription ID
#
#   Required GitHub environment variables:
#     TFSTATE_RESOURCE_GROUP_PERF - Resource group containing the tfstate storage account
#     TFSTATE_STORAGE_ACCOUNT_PERF - Storage account name for Terraform remote state
#     TFSTATE_CONTAINER_PERF   - Blob container name for Terraform state files
#     CONTAINER_REGISTRY_LOGIN_SERVER_PERF - ACR login server (e.g. crXXXtaskifydev.azurecr.io)
#
#   Optional GitHub environment or repository variables (used for push trigger):
#     DEPLOY_UID_PERF          - Unique identifier for resource naming (e.g. abc12)
#     DEPLOY_LOCATION_PERF     - Azure region (default: eastus)
#     DEPLOY_ENVIRONMENT_PERF  - Target environment: dev | stg | prd (default: dev)
#     API_IMAGE_TAG_PERF       - Container image tag (default: latest)
#
# Prerequisites (one-time setup per environment):
#   The service principal used for OIDC must have the following RBAC roles in
#   the target subscription:
#     - Contributor                  (deploy resources)
#     - Key Vault Secrets Officer    (write secrets to Key Vault post-deployment)
#     - Storage Blob Data Contributor (read/write Terraform remote state)
# =============================================================================

name: Deploy Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
        default: dev
      location:
        description: 'Azure region (e.g., eastus, westus3)'
        required: true
        type: string
        default: eastus
      uid:
        description: 'Unique identifier for resource naming (e.g., abc12)'
        required: true
        type: string
  push:
    branches:
      - main
      - demo/performance-testing
    paths:
      - 'concept/infrastructure/terraform/**'

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-terraform-${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # terraform-plan: Format check, init, validate, and plan
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}

    env:
      TF_VAR_uid:                              ${{ inputs.uid || vars.DEPLOY_UID_PERF }}
      TF_VAR_location:                         ${{ inputs.location || vars.DEPLOY_LOCATION_PERF || 'eastus' }}
      TF_VAR_environment:                      ${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}
      TF_VAR_container_registry_login_server:  ${{ vars.CONTAINER_REGISTRY_LOGIN_SERVER_PERF }}
      TF_VAR_api_image_tag:                    ${{ vars.API_IMAGE_TAG_PERF || 'latest' }}
      ARM_CLIENT_ID:                           ${{ secrets.AZURE_CLIENT_ID_PERF }}
      ARM_TENANT_ID:                           ${{ secrets.AZURE_TENANT_ID_PERF }}
      ARM_SUBSCRIPTION_ID:                     ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}
      ARM_USE_OIDC:                            "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required inputs
        run: |
          UID_VAL="${{ inputs.uid || vars.DEPLOY_UID_PERF }}"
          if [[ -z "${UID_VAL}" ]]; then
            echo "::error::UID is required. Provide 'uid' as a workflow_dispatch input or set the DEPLOY_UID_PERF repository/environment variable."
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        working-directory: concept/infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: concept/infrastructure/terraform
        run: |
          ENV="${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}"
          UID_VAL="${{ inputs.uid || vars.DEPLOY_UID_PERF }}"
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_PERF }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_PERF }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_PERF }}" \
            -backend-config="key=taskify-${ENV}.tfstate"

      - name: Terraform Validate
        working-directory: concept/infrastructure/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: concept/infrastructure/terraform
        run: |
          terraform plan \
            -out=tfplan \
            -input=false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}
          path: concept/infrastructure/terraform/tfplan
          retention-days: 1

  # ---------------------------------------------------------------------------
  # terraform-apply: Apply the saved plan
  # ---------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: ${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID_PERF }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID_PERF }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: concept/infrastructure/terraform
        run: |
          ENV="${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}"
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_PERF }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_PERF }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_PERF }}" \
            -backend-config="key=taskify-${ENV}.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}
          path: concept/infrastructure/terraform

      - name: Terraform Apply
        id: tf_apply
        working-directory: concept/infrastructure/terraform
        run: terraform apply -input=false tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: concept/infrastructure/terraform
        run: |
          API_URL=$(terraform output -raw api_url)
          WEB_URL=$(terraform output -raw web_url)
          KV_NAME=$(terraform output -raw key_vault_name)
          DB_SERVER=$(terraform output -raw db_server_name)
          SWA_CMD=$(terraform output -raw swa_api_settings_command)

          echo "api_url=${API_URL}"       >> "$GITHUB_OUTPUT"
          echo "web_url=${WEB_URL}"       >> "$GITHUB_OUTPUT"
          echo "kv_name=${KV_NAME}"       >> "$GITHUB_OUTPUT"
          echo "db_server=${DB_SERVER}"   >> "$GITHUB_OUTPUT"

          # Store the multi-line SWA command safely
          {
            echo "swa_cmd<<EOF_SWA"
            echo "${SWA_CMD}"
            echo "EOF_SWA"
          } >> "$GITHUB_OUTPUT"

      - name: Wire API URL into Static Web App
        run: |
          ${{ steps.tf_outputs.outputs.swa_cmd }}

      - name: Write deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Terraform Deployment Summary

          | Resource        | Value |
          |-----------------|-------|
          | Environment     | ${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }} |
          | API URL         | ${{ steps.tf_outputs.outputs.api_url }} |
          | Web URL         | ${{ steps.tf_outputs.outputs.web_url }} |
          | Key Vault       | ${{ steps.tf_outputs.outputs.kv_name }} |
          | Database Server | ${{ steps.tf_outputs.outputs.db_server }} |
          EOF
