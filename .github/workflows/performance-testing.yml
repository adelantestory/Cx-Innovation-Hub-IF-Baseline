# =============================================================================
# Performance Testing
# =============================================================================
# Runs Locust performance tests against a local Docker Compose stack and,
# optionally, against deployed Azure infrastructure via Azure Load Testing.
#
# Scenarios are auto-discovered from concept/tests/performance/scenarios/test_*.py
# — add a new file and it automatically runs in the pipeline.
#
# Pipeline structure:
#   1. discover-scenarios  — scans scenarios/ folder, outputs dynamic JSON matrix
#   2. local-verification  — runs ALL scenarios combined via locustfile.py
#   3. local-scenario-tests — matrix: each scenario runs individually in parallel
#   4. cloud-load-test      — matrix: each scenario as a separate Azure Load Test
#
# Authentication (cloud tests only): OIDC federated credentials (no stored secrets).
#   Required GitHub environment secrets:
#     AZURE_CLIENT_ID_PERF        - Service principal / workload identity client ID
#     AZURE_TENANT_ID_PERF        - Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID_PERF  - Target Azure subscription ID
#
#   Required GitHub variables (optional – fall back to workflow inputs):
#     DEPLOY_UID_PERF             - Unique deployment identifier
#     DEPLOY_ENVIRONMENT_PERF     - Target environment (dev/stg/prd/perf)
#
# Thresholds:
#   - GET  requests: p95 < 500ms
#   - POST/PATCH requests: p95 < 1000ms
#   - Overall error rate: < 1%
# =============================================================================

name: Performance Testing

on:
  workflow_dispatch:
    inputs:
      deploy_uid:
        description: 'Unique identifier for resource naming'
        required: false
        default: 'perfv2'
        type: string
      environment:
        description: 'Environment'
        required: false
        default: 'perf'
        type: choice
        options:
          - dev
          - stg
          - prd
          - perf
      target_url:
        description: 'Override API URL (leave empty to auto-detect from Azure)'
        required: false
        default: ''
        type: string
      run_cloud_tests:
        description: 'Run Azure Load Testing (requires deployed infrastructure)'
        required: false
        default: false
        type: boolean
      combined_users:
        description: 'Virtual users for combined verification run'
        required: false
        default: '50'
        type: string
      combined_duration:
        description: 'Duration for combined verification run (e.g., 2m, 5m, 10m)'
        required: false
        default: '3m'
        type: string
      combined_ramp_rate:
        description: 'User spawn rate per second for combined run'
        required: false
        default: '10'
        type: string
      scenario_users:
        description: 'Virtual users per individual scenario test'
        required: false
        default: '50'
        type: string
      scenario_duration:
        description: 'Duration per individual scenario test (e.g., 2m, 5m, 10m)'
        required: false
        default: '3m'
        type: string
      scenario_ramp_rate:
        description: 'User spawn rate per second for scenario tests'
        required: false
        default: '10'
        type: string
  push:
    paths:
      - 'concept/tests/performance/**'
      - '.github/workflows/performance-testing.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: perf-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # discover-scenarios: Auto-detect test_*.py files for matrix jobs
  # ---------------------------------------------------------------------------
  discover-scenarios:
    name: Discover Scenarios
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      count: ${{ steps.scan.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for scenario files
        id: scan
        run: |
          SCENARIOS_DIR="concept/tests/performance/scenarios"
          MATRIX_JSON="["
          FIRST=true
          COUNT=0

          for FILE in ${SCENARIOS_DIR}/test_*.py; do
            [ -f "$FILE" ] || continue
            COUNT=$((COUNT + 1))

            # Derive name and description from filename
            BASENAME=$(basename "$FILE" .py)                        # test_browse_projects
            SCENARIO_NAME="${BASENAME#test_}"                       # browse_projects
            DISPLAY_NAME=$(echo "$SCENARIO_NAME" | sed 's/_/ /g; s/\b\(.\)/\u\1/g')  # Browse Projects

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX_JSON+=","
            fi
            MATRIX_JSON+="{\"name\":\"${SCENARIO_NAME}\",\"file\":\"${FILE}\",\"description\":\"${DISPLAY_NAME}\"}"
          done
          MATRIX_JSON+="]"

          echo "Discovered ${COUNT} scenario(s):"
          echo "$MATRIX_JSON" | jq .

          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # local-verification: Run ALL scenarios combined via locustfile.py
  # ---------------------------------------------------------------------------
  local-verification:
    name: Local Performance Verification
    needs: discover-scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: concept/tests/performance/requirements.txt

      - name: Install Locust and dependencies
        run: |
          pip install -r concept/tests/performance/requirements.txt

      - name: Start Docker Compose services
        run: |
          cd concept
          docker compose up -d --wait
          echo "Docker Compose services started"

      - name: Wait for API health
        run: |
          echo "Waiting for API to be healthy..."
          MAX_WAIT=30
          INTERVAL=2
          ELAPSED=0
          until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "::error::API health check timed out after ${MAX_WAIT}s"
              docker compose -f concept/docker-compose.yml logs
              exit 1
            fi
            echo "  Waiting... (${ELAPSED}s / ${MAX_WAIT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "API is healthy (responded in ${ELAPSED}s)"

      - name: Create results directory
        run: mkdir -p concept/tests/performance/results

      - name: Run Locust — all scenarios combined
        env:
          LOCUST_USERS: ${{ inputs.combined_users || '50' }}
          LOCUST_DURATION: ${{ inputs.combined_duration || '2m' }}
          LOCUST_RAMP_RATE: ${{ inputs.combined_ramp_rate || '10' }}
        run: |
          cd concept/tests/performance
          echo "Running with ${LOCUST_USERS} users, ramp ${LOCUST_RAMP_RATE}/s, duration ${LOCUST_DURATION}"
          locust -f locustfile.py \
            --host=http://localhost:3000 \
            --headless \
            -u "${LOCUST_USERS}" \
            -r "${LOCUST_RAMP_RATE}" \
            -t "${LOCUST_DURATION}" \
            --csv=results/taskify \
            --html=results/report.html

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-local-combined
          path: concept/tests/performance/results/
          retention-days: 30

      - name: Check performance thresholds
        if: success()
        run: |
          STATS_FILE="concept/tests/performance/results/taskify_stats.csv"
          FAILED=0

          if [ ! -f "$STATS_FILE" ]; then
            echo "::error::Stats CSV not found at ${STATS_FILE}"
            exit 1
          fi

          echo "## Performance Threshold Results — Combined" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | Endpoint | p95 (ms) | Threshold (ms) | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|----------|----------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          while IFS=',' read -r TYPE NAME REQ_COUNT FAIL_COUNT MEDIAN AVG MIN MAX AVG_SIZE RPS FAIL_PER_SEC P50 P66 P75 P80 P90 P95 P98 P99 P999 P9999 P100; do
            if echo "$NAME" | grep -qi "aggregated"; then continue; fi

            TYPE=$(echo "$TYPE" | tr -d '"')
            NAME=$(echo "$NAME" | tr -d '"')
            P95_VAL=$(echo "$P95" | tr -d '"' | tr -d ' ')

            if [ -z "$TYPE" ] || [ -z "$P95_VAL" ]; then continue; fi

            case "$TYPE" in
              GET)       THRESHOLD=500  ;;
              POST|PATCH) THRESHOLD=1000 ;;
              *)         THRESHOLD=1000 ;;
            esac

            if [ "$(echo "$P95_VAL > $THRESHOLD" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              STATUS="❌ FAIL"
              echo "::warning::${TYPE} ${NAME} p95=${P95_VAL}ms exceeds threshold ${THRESHOLD}ms"
              FAILED=1
            else
              STATUS="✅ PASS"
            fi

            echo "| ${TYPE} | ${NAME} | ${P95_VAL} | ${THRESHOLD} | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done < <(tail -n +2 "$STATS_FILE")

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Error Rate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          AGG_LINE=$(tail -n +2 "$STATS_FILE" | grep -i "aggregated" || true)
          if [ -n "$AGG_LINE" ]; then
            TOTAL_REQS=$(echo "$AGG_LINE" | awk -F',' '{print $3}' | tr -d '"')
            TOTAL_FAILS=$(echo "$AGG_LINE" | awk -F',' '{print $4}' | tr -d '"')

            if [ "$TOTAL_REQS" -gt 0 ] 2>/dev/null; then
              ERROR_RATE=$(echo "scale=2; $TOTAL_FAILS * 100 / $TOTAL_REQS" | bc -l)
              if [ "$(echo "$ERROR_RATE > 1" | bc -l)" = "1" ]; then
                echo "| Error Rate | ${ERROR_RATE}% | < 1% | ❌ FAIL |" >> "$GITHUB_STEP_SUMMARY"
                echo "::error::Error rate ${ERROR_RATE}% exceeds 1% threshold"
                FAILED=1
              else
                echo "| Error Rate | ${ERROR_RATE}% | < 1% | ✅ PASS |" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Users**: ${{ inputs.combined_users || '50' }} (ramp rate: ${{ inputs.combined_ramp_rate || '10' }}/s)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration**: ${{ inputs.combined_duration || '2m' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total Requests**: ${TOTAL_REQS:-N/A}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Failed Requests**: ${TOTAL_FAILS:-N/A}" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::Performance thresholds exceeded — see summary for details"
            exit 1
          fi

      - name: Tear down Docker Compose
        if: always()
        run: |
          cd concept
          docker compose down -v
          echo "Docker Compose services stopped and volumes removed"

  # ---------------------------------------------------------------------------
  # local-scenario-tests: Run each scenario individually (matrix, parallel)
  # ---------------------------------------------------------------------------
  local-scenario-tests:
    name: "Local — ${{ matrix.scenario.description }}"
    needs: [discover-scenarios, local-verification]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.discover-scenarios.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: concept/tests/performance/requirements.txt

      - name: Install Locust and dependencies
        run: pip install -r concept/tests/performance/requirements.txt

      - name: Start Docker Compose services
        run: |
          cd concept
          docker compose up -d --wait

      - name: Wait for API health
        run: |
          MAX_WAIT=30; INTERVAL=2; ELAPSED=0
          until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
            [ "$ELAPSED" -ge "$MAX_WAIT" ] && echo "::error::API timeout" && exit 1
            sleep "$INTERVAL"; ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: Run Locust — ${{ matrix.scenario.description }}
        env:
          LOCUST_USERS: ${{ inputs.scenario_users || '20' }}
          LOCUST_DURATION: ${{ inputs.scenario_duration || '1m' }}
          LOCUST_RAMP_RATE: ${{ inputs.scenario_ramp_rate || '5' }}
        run: |
          cd concept/tests/performance
          mkdir -p results

          # Strip the leading path since we already cd'd into the perf directory
          SCENARIO_FILE=$(echo "${{ matrix.scenario.file }}" | sed 's|^concept/tests/performance/||')

          echo "Running ${{ matrix.scenario.description }} with ${LOCUST_USERS} users, ramp ${LOCUST_RAMP_RATE}/s, duration ${LOCUST_DURATION}"

          # Run individual scenario using the module path so relative imports work
          python -m locust \
            -f "${SCENARIO_FILE}" \
            --host=http://localhost:3000 \
            --headless \
            -u "${LOCUST_USERS}" \
            -r "${LOCUST_RAMP_RATE}" \
            -t "${LOCUST_DURATION}" \
            --csv=results/${{ matrix.scenario.name }} \
            --html=results/${{ matrix.scenario.name }}_report.html

      - name: Upload results — ${{ matrix.scenario.description }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-local-${{ matrix.scenario.name }}
          path: concept/tests/performance/results/
          retention-days: 30

      - name: Check thresholds — ${{ matrix.scenario.description }}
        if: success()
        run: |
          STATS_FILE="concept/tests/performance/results/${{ matrix.scenario.name }}_stats.csv"
          FAILED=0

          if [ ! -f "$STATS_FILE" ]; then
            echo "::error::Stats CSV not found: $STATS_FILE"
            exit 1
          fi

          echo "## ${{ matrix.scenario.description }} — Threshold Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | Endpoint | p95 (ms) | Threshold (ms) | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|----------|----------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          while IFS=',' read -r TYPE NAME REQ_COUNT FAIL_COUNT MEDIAN AVG MIN MAX AVG_SIZE RPS FAIL_PER_SEC P50 P66 P75 P80 P90 P95 P98 P99 P999 P9999 P100; do
            if echo "$NAME" | grep -qi "aggregated"; then continue; fi

            TYPE=$(echo "$TYPE" | tr -d '"')
            NAME=$(echo "$NAME" | tr -d '"')
            P95_VAL=$(echo "$P95" | tr -d '"' | tr -d ' ')

            if [ -z "$TYPE" ] || [ -z "$P95_VAL" ]; then continue; fi

            case "$TYPE" in
              GET)        THRESHOLD=500  ;;
              POST|PATCH) THRESHOLD=1000 ;;
              *)          THRESHOLD=1000 ;;
            esac

            if [ "$(echo "$P95_VAL > $THRESHOLD" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              echo "| ${TYPE} | ${NAME} | ${P95_VAL} | ${THRESHOLD} | ❌ FAIL |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            else
              echo "| ${TYPE} | ${NAME} | ${P95_VAL} | ${THRESHOLD} | ✅ PASS |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < <(tail -n +2 "$STATS_FILE")

          if [ "$FAILED" = "1" ]; then
            echo "::error::${{ matrix.scenario.description }} thresholds exceeded"
            exit 1
          fi

      - name: Tear down Docker Compose
        if: always()
        run: cd concept && docker compose down -v

  # ---------------------------------------------------------------------------
  # cloud-load-test: Run each scenario as a separate Azure Load Test (matrix)
  # ---------------------------------------------------------------------------
  cloud-load-test:
    name: "Azure Load Test — ${{ matrix.scenario.description }}"
    needs: [discover-scenarios, local-scenario-tests]
    if: github.event.inputs.run_cloud_tests == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/demo/performance-testing')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.discover-scenarios.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Install Azure Load Testing CLI extension
        run: az extension add --name load --yes

      - name: Resolve resource names and API URL
        id: vars
        run: |
          UID_VAL="${{ inputs.deploy_uid || vars.DEPLOY_UID_PERF || 'perfv2' }}"
          ENV="${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'perf' }}"
          RG="rg-${UID_VAL}-taskify-${ENV}"
          LT_NAME="lt-${UID_VAL}-taskify-${ENV}"
          AI_NAME="appi-${UID_VAL}-taskify-${ENV}"

          echo "uid=${UID_VAL}"              >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}"          >> "$GITHUB_OUTPUT"
          echo "resource_group=${RG}"        >> "$GITHUB_OUTPUT"
          echo "load_test_name=${LT_NAME}"   >> "$GITHUB_OUTPUT"
          echo "app_insights_name=${AI_NAME}" >> "$GITHUB_OUTPUT"

          TARGET_URL="${{ inputs.target_url }}"
          if [ -z "$TARGET_URL" ]; then
            echo "Auto-detecting API URL from Container App ca-${UID_VAL}-taskify-api..."
            FQDN=$(az containerapp show \
              --name "ca-${UID_VAL}-taskify-api" \
              --resource-group "$RG" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || true)
            if [ -n "$FQDN" ]; then
              TARGET_URL="https://${FQDN}"
            else
              echo "::error::Could not auto-detect API URL. Provide target_url input or verify the Container App exists."
              exit 1
            fi
          fi

          echo "api_url=${TARGET_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved API URL: ${TARGET_URL}"

      - name: Warm up Container App (wake from cold start)
        run: |
          API_URL="${{ steps.vars.outputs.api_url }}"
          echo "Warming up API at ${API_URL}..."
          MAX_ATTEMPTS=12
          ATTEMPT=0
          until curl -sf --max-time 10 "${API_URL}/api/health" > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "::warning::API did not respond after ${MAX_ATTEMPTS} attempts (may be cold-starting)"
              break
            fi
            echo "  Attempt ${ATTEMPT}/${MAX_ATTEMPTS} — waiting 10s for container to start..."
            sleep 10
          done
          if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
            echo "API is warm and responding (attempt ${ATTEMPT})"
          fi
          # Hit a few more endpoints to fully warm the connection pool
          curl -sf --max-time 10 "${API_URL}/api/users" > /dev/null 2>&1 || true
          curl -sf --max-time 10 "${API_URL}/api/projects" > /dev/null 2>&1 || true

      - name: Create and run load test — ${{ matrix.scenario.description }}
        id: load_test
        run: |
          TEST_ID="perf-${{ matrix.scenario.name }}-$(date +%Y%m%d-%H%M%S)"
          echo "test_id=${TEST_ID}" >> "$GITHUB_OUTPUT"
          echo "test_start=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

          LT_NAME="${{ steps.vars.outputs.load_test_name }}"
          RG="${{ steps.vars.outputs.resource_group }}"
          API_URL="${{ steps.vars.outputs.api_url }}"
          SCENARIOS_DIR="concept/tests/performance/scenarios"

          # Resolve Locust run parameters from workflow inputs
          CLOUD_USERS="${{ inputs.scenario_users || '50' }}"
          CLOUD_DURATION="${{ inputs.scenario_duration || '3m' }}"
          CLOUD_RAMP="${{ inputs.scenario_ramp_rate || '10' }}"

          # Convert duration to seconds (Azure Load Testing requires integer)
          # Supports formats: 3m, 5m, 10m, 300s, or raw seconds
          if echo "$CLOUD_DURATION" | grep -qE '^[0-9]+m$'; then
            DURATION_SECS=$(( ${CLOUD_DURATION%m} * 60 ))
          elif echo "$CLOUD_DURATION" | grep -qE '^[0-9]+s$'; then
            DURATION_SECS=${CLOUD_DURATION%s}
          elif echo "$CLOUD_DURATION" | grep -qE '^[0-9]+$'; then
            DURATION_SECS=$CLOUD_DURATION
          else
            echo "::warning::Unrecognized duration format '${CLOUD_DURATION}', defaulting to 180s"
            DURATION_SECS=180
          fi
          echo "Cloud test: ${CLOUD_USERS} users, ${DURATION_SECS}s, ramp ${CLOUD_RAMP}/s"

          # Azure Load Testing does not pass --env values as actual environment
          # variables to the Locust process.  Inject the real API URL directly
          # into the working copy of base.py so the class-level `host` default
          # points at the deployed Container App instead of localhost.
          sed -i "s|http://localhost:3000|${API_URL}|g" "${SCENARIOS_DIR}/base.py"
          echo "Patched base.py default host → ${API_URL}"

          # Create the load test definition
          az load test create \
            --name "$LT_NAME" \
            --resource-group "$RG" \
            --test-id "${TEST_ID}" \
            --test-plan "${{ matrix.scenario.file }}" \
            --engine-instances 1 \
            --env LOCUST_USERS="${CLOUD_USERS}" LOCUST_SPAWN_RATE="${CLOUD_RAMP}" LOCUST_RUN_TIME="${DURATION_SECS}" \
            --output none

          # Upload supporting files (base class + __init__.py) for relative imports
          for SUPPORT_FILE in "${SCENARIOS_DIR}/base.py" "${SCENARIOS_DIR}/__init__.py"; do
            if [ -f "$SUPPORT_FILE" ]; then
              az load test file upload \
                --name "$LT_NAME" \
                --resource-group "$RG" \
                --test-id "${TEST_ID}" \
                --path "$SUPPORT_FILE" \
                --file-type ADDITIONAL_ARTIFACTS \
                --output none
              echo "Uploaded supporting file: ${SUPPORT_FILE}"
            fi
          done

          # Start the test run
          az load test-run create \
            --name "$LT_NAME" \
            --resource-group "$RG" \
            --test-id "${TEST_ID}" \
            --test-run-id "${TEST_ID}-run" \
            --output none

          echo "test_end=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Wait for test completion
        run: |
          echo "Waiting for '${{ matrix.scenario.description }}' load test to complete..."
          MAX_WAIT=600
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            STATUS=$(az load test-run show \
              --name "${{ steps.vars.outputs.load_test_name }}" \
              --resource-group "${{ steps.vars.outputs.resource_group }}" \
              --test-run-id "${{ steps.load_test.outputs.test_id }}-run" \
              --query "status" -o tsv 2>/dev/null || echo "UNKNOWN")

            echo "  Status: ${STATUS} (${ELAPSED}s / ${MAX_WAIT}s)"

            if [ "$STATUS" = "DONE" ] || [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Load test finished with status: ${STATUS}"
              break
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
            echo "::error::Load test timed out after ${MAX_WAIT}s"
            exit 1
          fi

          if [ "$STATUS" = "FAILED" ]; then
            echo "::error::Load test '${{ matrix.scenario.description }}' failed"
            exit 1
          fi

      - name: Download test results
        run: |
          mkdir -p cloud-results
          az load test-run download-files \
            --name "${{ steps.vars.outputs.load_test_name }}" \
            --resource-group "${{ steps.vars.outputs.resource_group }}" \
            --test-run-id "${{ steps.load_test.outputs.test_id }}-run" \
            --path cloud-results \
            --force \
            --output none || echo "::warning::Could not download all result files"

      - name: Upload cloud test results — ${{ matrix.scenario.description }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-cloud-${{ matrix.scenario.name }}
          path: cloud-results/
          retention-days: 30

      - name: Query Application Insights for errors
        id: ai_query
        run: |
          AI_NAME="${{ steps.vars.outputs.app_insights_name }}"
          RG="${{ steps.vars.outputs.resource_group }}"
          START="${{ steps.load_test.outputs.test_start }}"
          END="${{ steps.load_test.outputs.test_end }}"

          ERRORS=$(az monitor app-insights query \
            --app "$AI_NAME" \
            --resource-group "$RG" \
            --analytics-query "
              exceptions
              | where timestamp between(datetime('${START}') .. datetime('${END}'))
              | summarize ErrorCount=count() by type, outerMessage
              | order by ErrorCount desc
              | take 20
            " \
            --output json 2>/dev/null || echo '{"tables":[{"rows":[]}]}')

          FAILED_REQS=$(az monitor app-insights query \
            --app "$AI_NAME" \
            --resource-group "$RG" \
            --analytics-query "
              requests
              | where timestamp between(datetime('${START}') .. datetime('${END}'))
              | summarize TotalRequests=count(), FailedRequests=countif(success == false),
                          AvgDuration=avg(duration), P95Duration=percentile(duration, 95)
              | extend ErrorRate=round(100.0 * FailedRequests / TotalRequests, 2)
            " \
            --output json 2>/dev/null || echo '{"tables":[{"rows":[]}]}')

          echo "errors<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ERRORS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "failed_reqs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_REQS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post cloud test summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY_EOF'
          ## Azure Load Test — ${{ matrix.scenario.description }}

          | Property | Value |
          |----------|-------|
          | Test ID | ${{ steps.load_test.outputs.test_id }} |
          | Scenario | ${{ matrix.scenario.description }} |
          | API URL | ${{ steps.vars.outputs.api_url }} |
          | Environment | ${{ steps.vars.outputs.environment }} |
          | Resource Group | ${{ steps.vars.outputs.resource_group }} |
          | Load Test Resource | ${{ steps.vars.outputs.load_test_name }} |
          | Framework | Locust |
          SUMMARY_EOF
