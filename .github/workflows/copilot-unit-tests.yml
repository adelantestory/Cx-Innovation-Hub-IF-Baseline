name: Run Unit Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR to avoid wasting runner minutes
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions: read code, write PR description
permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Use 'npm ci' for reproducible, locked installs (faster and safer than 'npm install')
      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        working-directory: concept/apps/api
        run: npm ci

      - name: Install web dependencies
        working-directory: concept/apps/web
        run: npm ci

      # Run API unit tests if a test script is defined
      - name: Run API unit tests
        working-directory: concept/apps/api
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1);" 2>/dev/null; then
            npm test
          else
            echo "No test script found in API package.json — skipping."
          fi

      # Run web unit tests if a test script is defined
      - name: Run web unit tests
        working-directory: concept/apps/web
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1);" 2>/dev/null; then
            npm test
          else
            echo "No test script found in web package.json — skipping."
          fi

      - name: Generate Code Quality Report
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: >
          npx --yes @github/copilot -p
          "Review the code quality of changes in this pull request.
          Use the claude-opus-4.6 and codex-5.3 models to produce a combined analysis.
          Post the results as a PR description update in plain language that my team can understand."
          --yolo