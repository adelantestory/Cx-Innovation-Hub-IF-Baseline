# =============================================================================
# Deploy Infrastructure
# =============================================================================
# Deploys Azure infrastructure using the unified Bicep template at
# concept/infrastructure/bicep/main.bicep.
#
# Authentication: OIDC federated credentials (no stored secrets).
#   Required GitHub environment secrets:
#     AZURE_CLIENT_ID_PERF     - Service principal / workload identity client ID
#     AZURE_TENANT_ID_PERF     - Azure AD tenant ID
#     AZURE_SUBSCRIPTION_ID_PERF - Target Azure subscription ID
#     PG_ADMIN_PASSWORD_PERF   - PostgreSQL administrator password
#
#   Required GitHub environment or repository variables:
#     CONTAINER_REGISTRY_LOGIN_SERVER_PERF - ACR login server (e.g., crXXXtaskifydev.azurecr.io)
#
#   Optional GitHub environment or repository variables (used for push trigger):
#     DEPLOY_UID_PERF          - Unique identifier for resource naming (e.g., abc12)
#     DEPLOY_LOCATION_PERF     - Azure region (default: eastus)
#     DEPLOY_ENVIRONMENT_PERF  - Target environment: dev | stg | prd (default: dev)
#     API_IMAGE_TAG_PERF       - Container image tag (default: latest)
#
# Prerequisites (one-time setup per environment):
#   The service principal used for OIDC must have the following RBAC roles in
#   the target subscription or resource group:
#     - Contributor          (deploy resources)
#     - Key Vault Secrets Officer  (write secrets to Key Vault post-deployment)
#   Assign with:
#     az role assignment create \
#       --assignee <AZURE_CLIENT_ID_PERF> \
#       --role "Key Vault Secrets Officer" \
#       --scope /subscriptions/<AZURE_SUBSCRIPTION_ID_PERF>
# =============================================================================

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - stg
          - prd
          - perf
        default: perf
      location:
        description: 'Azure region (e.g., eastus, westus3)'
        required: true
        type: string
        default: eastus
      uid:
        description: 'Unique identifier for resource naming (e.g., abc12)'
        required: true
        type: string
  push:
    branches:
      - main
      - demo/performance-testing
    paths:
      - 'concept/infrastructure/bicep/**'

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # validate: Lint and pre-flight check the Bicep template
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        id: vars
        run: |
          ENV="${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'perf' }}"
          LOCATION="${{ inputs.location || vars.DEPLOY_LOCATION_PERF || 'eastus' }}"
          UID_VAL="${{ inputs.uid || vars.DEPLOY_UID_PERF }}"
          RG="rg-${UID_VAL}-taskify-${ENV}"
          if [[ -z "${UID_VAL}" ]]; then
            echo "::error::UID is required. Provide 'uid' as a workflow_dispatch input or set the DEPLOY_UID_PERF repository/environment variable."
            exit 1
          fi
          echo "environment=${ENV}"      >> "$GITHUB_OUTPUT"
          echo "location=${LOCATION}"    >> "$GITHUB_OUTPUT"
          echo "uid=${UID_VAL}"          >> "$GITHUB_OUTPUT"
          echo "resource_group=${RG}"    >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Lint Bicep template
        run: |
          az bicep build --file concept/infrastructure/bicep/main.bicep

      - name: Create resource group (required for group-scoped validation)
        run: |
          az group create \
            --name "${{ steps.vars.outputs.resource_group }}" \
            --location "${{ steps.vars.outputs.location }}" \
            --tags Environment="${{ steps.vars.outputs.environment }}" Purpose="Taskify POC" \
            --output none
          echo "Resource group ready: ${{ steps.vars.outputs.resource_group }}"

      - name: Validate Bicep deployment
        run: |
          az deployment group validate \
            --resource-group "${{ steps.vars.outputs.resource_group }}" \
            --template-file concept/infrastructure/bicep/main.bicep \
            --parameters \
              uid="${{ steps.vars.outputs.uid }}" \
              location="${{ steps.vars.outputs.location }}" \
              environment="${{ steps.vars.outputs.environment }}" \
              pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD_PERF }}" \
              containerRegistryLoginServer="${{ vars.CONTAINER_REGISTRY_LOGIN_SERVER_PERF }}"

  # ---------------------------------------------------------------------------
  # deploy: Create or update Azure resources
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        id: vars
        run: |
          ENV="${{ inputs.environment || vars.DEPLOY_ENVIRONMENT_PERF || 'perf' }}"
          LOCATION="${{ inputs.location || vars.DEPLOY_LOCATION_PERF || 'eastus' }}"
          UID_VAL="${{ inputs.uid || vars.DEPLOY_UID_PERF }}"
          IMAGE_TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          RG="rg-${UID_VAL}-taskify-${ENV}"
          if [[ -z "${UID_VAL}" ]]; then
            echo "::error::UID is required. Provide 'uid' as a workflow_dispatch input or set the DEPLOY_UID_PERF repository/environment variable."
            exit 1
          fi
          echo "environment=${ENV}"      >> "$GITHUB_OUTPUT"
          echo "location=${LOCATION}"    >> "$GITHUB_OUTPUT"
          echo "uid=${UID_VAL}"          >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"  >> "$GITHUB_OUTPUT"
          echo "resource_group=${RG}"    >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ steps.vars.outputs.resource_group }}" \
            --location "${{ steps.vars.outputs.location }}" \
            --tags Environment="${{ steps.vars.outputs.environment }}" Purpose="Taskify POC" \
            --output none
          echo "Resource group: ${{ steps.vars.outputs.resource_group }}"

      - name: Deploy Bicep template
        id: bicep_deploy
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group "${{ steps.vars.outputs.resource_group }}" \
            --template-file concept/infrastructure/bicep/main.bicep \
            --parameters \
              uid="${{ steps.vars.outputs.uid }}" \
              location="${{ steps.vars.outputs.location }}" \
              environment="${{ steps.vars.outputs.environment }}" \
              pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD_PERF }}" \
              containerRegistryLoginServer="${{ vars.CONTAINER_REGISTRY_LOGIN_SERVER_PERF }}" \
              apiImageTag="${{ steps.vars.outputs.image_tag }}" \
            --query "properties.outputs" \
            --output json)

          API_URL=$(echo "$OUTPUT" | jq -r '.apiUrl.value')
          WEB_URL=$(echo "$OUTPUT" | jq -r '.webUrl.value')
          KV_NAME=$(echo "$OUTPUT" | jq -r '.keyVaultName.value')
          DB_SERVER=$(echo "$OUTPUT" | jq -r '.dbServerName.value')
          DB_FQDN=$(echo "$OUTPUT" | jq -r '.dbServerFqdn.value')
          APPI_CONN=$(echo "$OUTPUT" | jq -r '.appInsightsConnectionString.value // "not-deployed"')
          ACR_SERVER=$(echo "$OUTPUT" | jq -r '.containerRegistryLoginServer.value // "not-deployed"')

          echo "api_url=${API_URL}"      >> "$GITHUB_OUTPUT"
          echo "web_url=${WEB_URL}"      >> "$GITHUB_OUTPUT"
          echo "kv_name=${KV_NAME}"      >> "$GITHUB_OUTPUT"
          echo "db_server=${DB_SERVER}"  >> "$GITHUB_OUTPUT"
          echo "db_fqdn=${DB_FQDN}"      >> "$GITHUB_OUTPUT"
          echo "appi_connection_string=${APPI_CONN}" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${ACR_SERVER}" >> "$GITHUB_OUTPUT"

      - name: Store PostgreSQL credentials in Key Vault
        run: |
          KV_NAME="${{ steps.bicep_deploy.outputs.kv_name }}"
          DB_FQDN="${{ steps.bicep_deploy.outputs.db_fqdn }}"

          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "postgresql-admin-password" \
            --value "${{ secrets.PG_ADMIN_PASSWORD_PERF }}" \
            --output none

          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "postgresql-connection-host" \
            --value "$DB_FQDN" \
            --output none

          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "postgresql-admin-username" \
            --value "taskifyadmin" \
            --output none

          echo "PostgreSQL credentials stored in Key Vault: $KV_NAME"

      - name: Write deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Infrastructure Deployment Summary

          | Resource         | Value |
          |------------------|-------|
          | Environment      | ${{ steps.vars.outputs.environment }} |
          | Resource Group   | ${{ steps.vars.outputs.resource_group }} |
          | Key Vault        | ${{ steps.bicep_deploy.outputs.kv_name }} |
          | Database Server  | ${{ steps.bicep_deploy.outputs.db_server }} |
          | App Insights     | ${{ steps.bicep_deploy.outputs.appi_connection_string }} |
          | ACR Server       | ${{ steps.bicep_deploy.outputs.acr_login_server }} |
          EOF

    outputs:
      acr_login_server: ${{ steps.bicep_deploy.outputs.acr_login_server }}
      resource_group: ${{ steps.vars.outputs.resource_group }}
      environment: ${{ steps.vars.outputs.environment }}
      location: ${{ steps.vars.outputs.location }}
      uid: ${{ steps.vars.outputs.uid }}
      kv_name: ${{ steps.bicep_deploy.outputs.kv_name }}

  # ---------------------------------------------------------------------------
  # build-push: Build Docker images and push to ACR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Log in to ACR
        run: |
          az acr login --name "${{ needs.deploy.outputs.acr_login_server }}"

      - name: Build and push API image
        run: |
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          docker build \
            -t "${ACR}/taskify-api:${TAG}" \
            -f concept/apps/api/Dockerfile \
            concept/apps/api/
          docker push "${ACR}/taskify-api:${TAG}"

      - name: Build and push Web image
        run: |
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          docker build \
            --build-arg VITE_API_URL="https://placeholder.azurecontainerapps.io" \
            -t "${ACR}/taskify-web:${TAG}" \
            -f concept/apps/web/Dockerfile \
            concept/apps/web/
          docker push "${ACR}/taskify-web:${TAG}"

      - name: Write build summary
        run: |
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Container Images Built

          | Image | Tag |
          |-------|-----|
          | ${ACR}/taskify-api | ${TAG} |
          | ${ACR}/taskify-web | ${TAG} |
          EOF

  # ---------------------------------------------------------------------------
  # deploy-apps: Redeploy with ACR set to provision Container Apps (Stage 4)
  # ---------------------------------------------------------------------------
  deploy-apps:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: [deploy, build-push]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PERF }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_PERF }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PERF }}

      - name: Deploy applications (Bicep Stage 4)
        id: app_deploy
        run: |
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          OUTPUT=$(az deployment group create \
            --resource-group "${{ needs.deploy.outputs.resource_group }}" \
            --template-file concept/infrastructure/bicep/main.bicep \
            --parameters \
              uid="${{ needs.deploy.outputs.uid }}" \
              location="${{ needs.deploy.outputs.location }}" \
              environment="${{ needs.deploy.outputs.environment }}" \
              pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD_PERF }}" \
              containerRegistryLoginServer="${ACR}" \
              apiImageTag="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}" \
            --query "properties.outputs" \
            --output json)

          API_URL=$(echo "$OUTPUT" | jq -r '.apiUrl.value')
          WEB_URL=$(echo "$OUTPUT" | jq -r '.webUrl.value')

          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "web_url=${WEB_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::API URL: ${API_URL}"

      - name: Rebuild Web image with real API URL
        run: |
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          API_URL="${{ steps.app_deploy.outputs.api_url }}"
          echo "Building web image with VITE_API_URL=${API_URL}"
          az acr login --name "${ACR}"
          docker build \
            --build-arg VITE_API_URL="${API_URL}" \
            -t "${ACR}/taskify-web:${TAG}" \
            -f concept/apps/web/Dockerfile \
            concept/apps/web/
          docker push "${ACR}/taskify-web:${TAG}"

      - name: Update Web container app with new image
        run: |
          UID_VAL="${{ needs.deploy.outputs.uid }}"
          ENV="${{ needs.deploy.outputs.environment }}"
          RG="${{ needs.deploy.outputs.resource_group }}"
          ACR="${{ needs.deploy.outputs.acr_login_server }}"
          TAG="${{ vars.API_IMAGE_TAG_PERF || 'latest' }}"
          APP_NAME="ca-${UID_VAL}-taskify-web"
          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${RG}" \
            --image "${ACR}/taskify-web:${TAG}" \
            --output none
          echo "Web container app updated with correct API URL"

      - name: Write application deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Application Deployment Summary

          | App | URL |
          |-----|-----|
          | API | ${{ steps.app_deploy.outputs.api_url }} |
          | Web | ${{ steps.app_deploy.outputs.web_url }} |
          EOF
