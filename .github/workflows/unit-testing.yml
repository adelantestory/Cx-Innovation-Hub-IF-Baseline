name: Unit Testing

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'concept/apps/api/**'
      - 'concept/apps/web/**'
      - 'concept/tests/unit/**'
      - '.github/workflows/unit-testing.yml'
  push:
    branches:
      - main
      - demo/performance-testing
    paths:
      - 'concept/apps/api/**'
      - 'concept/apps/web/**'
      - 'concept/tests/unit/**'
      - '.github/workflows/unit-testing.yml'

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: concept/tests/unit/package-lock.json

      - name: Install unit test dependencies
        working-directory: concept/tests/unit
        run: npm ci

      - name: Run unit tests
        working-directory: concept/tests/unit
        run: npm test
