# =============================================================================
# ENGAGEMENT RULES
# These rules define when to engage which agents - typically unchanged per project
# =============================================================================
engagement_rules:
  application_code_change:
    description: When modifying code in concept/apps/<app>/
    engage:
      - role: primary
        source: applications.<app>.agents.primary
        task: Write application code
      - role: architect
        source: applications.<app>.agents.architect
        task: Review platform alignment
      - role: service_developer
        source: services.<consumed_service>.agents[1]
        condition: When code touches this service
        task: Review SDK usage and patterns
      - role: service_architect
        source: services.<consumed_service>.agents[0]
        condition: When schema/config/permissions change
        task: Approve configuration changes

  service_config_change:
    description: When modifying Azure service configuration
    engage:
      - agent: cloud-architect
        task: Update AZURE_CONFIG.json
      - agent: <service>-architect
        task: Design configuration change
      - agent: <service>-bicep or <service>-terraform
        task: Update IaC
      - role: app_primary
        source: For each app in services.<service>.consumed_by
        task: Update application code if needed

  infrastructure_change:
    description: When adding/modifying Azure resources
    engage:
      - agent: cloud-architect
        task: Architecture approval, AZURE_CONFIG.json
      - agent: subscription-expert
        task: Resource providers, quotas
      - agent: <service>-architect
        task: Resource design
      - agent: <service>-bicep or <service>-terraform
        task: Create IaC
      - agent: user-managed-identity-architect
        condition: If RBAC needed
        task: Configure identity roles
      - agent: document-writer
        task: Update ARCHITECTURE.md
      - agent: cost-analyst
        task: Update COST_ESTIMATE.md

  cross_cutting_change:
    description: When change affects multiple apps or services
    engage:
      - agent: cloud-architect
        task: Impact analysis, coordination
      - agents: All affected service architects
      - agents: All affected app primary developers
      - agent: project-manager
        condition: If scope impact
        task: Scope assessment

# =============================================================================
# PATH MAPPINGS
# Update paths based on your project's applications
# =============================================================================
path_to_agent:
  concept/apps/<app-1>/: <platform>-developer
  concept/infrastructure/bicep/: <service>-bicep
  concept/infrastructure/terraform/: <service>-terraform
  concept/docs/: document-writer
  concept/.specify/: spec-kit-expert
  concept/sql/: azure-sql-developer
  concept/AZURE_CONFIG.json: cloud-architect
