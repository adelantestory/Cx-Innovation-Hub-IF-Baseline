# Project Agent Manifest Template
# Copy to: .claude/context/PROJECT_AGENT_MANIFEST.yaml
# Maintained by: cloud-architect
# Created during: Stage 5 (Architecture)

metadata:
  last_modified: "YYYY-MM-DD"
  iac_preference: bicep  # bicep | terraform - choose one for the project

# =============================================================================
# APPLICATIONS
# Define each application in concept/apps/
# =============================================================================
applications:
  # Example application entry:
  # app-id:
  #   name: Human-readable name
  #   type: container-app | function-app | web-app
  #   path: concept/apps/<folder>/
  #   identity: managed-identity-name
  #   agents:
  #     primary: <platform>-developer
  #     architect: <platform>-architect
  #     iac: <platform>-bicep or <platform>-terraform
  #   consumes:
  #     - service: service-id
  #       ops: [read, write, query, send, receive, etc.]

  app-1:
    name:
    type:
    path: concept/apps//
    identity:
    agents:
      primary:
      architect:
      iac:
    consumes: []

